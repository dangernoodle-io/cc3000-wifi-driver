name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    uses: dangernoodle-io/.github/.github/workflows/pio-test.yml@main
    with:
      cppcheck-apt-install: true
    secrets: inherit
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [smoke, webclient, tcp_echo, poll_demo]
        board: [uno, r4-minima]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - run: pip install platformio
      - run: make ${{ matrix.example }}-${{ matrix.board }}
  summary:
    if: always()
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }} build=${{ needs.build.result }}"
            exit 1
          fi
