name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - uno
          - uno_r4_minima
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile vendored buildtest example
        run: |
          pio ci --board=${{ matrix.board }} --lib=. examples/buildtest/buildtest.ino
