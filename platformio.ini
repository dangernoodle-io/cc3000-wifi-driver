; PlatformIO config for cc3000-wifi-driver.
; Board envs live in examples/smoke/platformio.ini.
; Native/test env for host unit tests.

[platformio]

[env:native]
platform = native
test_framework = unity
test_filter = test_host
test_build_src = yes
; Stubs come first so Arduino.h resolves to our minimal version, not platform headers.
; Only include source files we want exercised by tests; the rest are excluded
; because they call into hardware-specific code paths that have no host equivalent.
build_src_filter = -<*> +<utility/cc3000_common.cpp>
extra_scripts = pre:scripts/coverage.py
build_flags =
    -O0
    -DUNITY_INCLUDE_DOUBLE
    -lm
    -std=gnu++17
    -Itest/stubs
    -Isrc
    -Isrc/utility
