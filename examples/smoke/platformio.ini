; Smoke example for cc3000-driver.
; Compiles the vendored Adafruit_CC3000 source for both supported targets.

[platformio]
default_envs = uno
src_dir = src
extra_configs = platformio_local.ini

[arduino_base]
framework = arduino
lib_extra_dirs = ../..
monitor_speed = 115200

[env:uno]
extends = arduino_base
platform = atmelavr@5.1.0
board = uno

[env:r4_minima]
extends = arduino_base
platform = renesas-ra
board = uno_r4_minima
