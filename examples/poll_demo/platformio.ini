; Poll demo example for cc3000-wifi-driver: non-blocking polling patterns.
; Compiles the vendored CC3000 source for both supported targets.

[platformio]
default_envs = uno
src_dir = src
extra_configs = platformio_local.ini

[arduino_base]
framework = arduino
lib_extra_dirs = ../..
build_flags = -Iinclude -DCC3K_DEBUG=1
monitor_speed = 115200

[env:uno]
extends = arduino_base
platform = atmelavr@5.1.0
board = uno

[env:r4_minima]
extends = arduino_base
platform = renesas-ra
board = uno_r4_minima
